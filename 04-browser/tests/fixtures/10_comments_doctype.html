<!DOCTYPE html>
<!-- Document-level comment -->
<html>
<!-- Comment in html element -->
<head>
  <!-- Comment in head -->
  <title>Comments &amp; DOCTYPE</title>
  <!-- Multi-line
       comment -->
</head>
<body>
  <!-- Inline comment --><p>Text right after comment</p>
  <p>Text with <!-- comment in middle --> words</p>

  <!-- Comment with dashes: -- not the end -->
  <!-- Comment with -(- dashes ---->

  <!-- HTML entities in content -->
  <p>Less than: &lt; and greater than: &gt;</p>
  <p>Ampersand: &amp; Quote: &quot; Apostrophe: &apos;</p>
  <p>Non-breaking space:&nbsp;between words</p>
  <p>Copyright: &copy; Registered: &reg; Trade: &trade;</p>
  <p>Euro: &euro; Pound: &pound;</p>
  <p>Em dash: &mdash; En dash: &ndash;</p>
  <p>Left quotes: &ldquo;text&rdquo;</p>
  <p>Numeric: &#65; &#x41; (both should be 'A')</p>

  <!-- Legacy DOCTYPE with public/system ids -->
</body>
</html>
<!-- Comment after html -->
